name: Apify Tesco Scraper

on:
  schedule:
    # 2x per week — Monday + Thursday at 6AM UTC. Matches other stores.
    # Was 1x/week (Monday only) — 2026-04-18 freshness fix.
    - cron: '0 6 * * 1'  # Monday
    - cron: '0 6 * * 4'  # Thursday
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of products to scrape (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Run without uploading prices'
        required: false
        type: boolean
        default: false
      retry_mode:
        description: 'Only scrape pending/failed products (retry mode)'
        required: false
        type: boolean
        default: false

jobs:
  scrape-tesco:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apify-client requests

      - name: Run Apify Tesco Scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_TESCO_API_TOKEN }}
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_USERNAME: ${{ secrets.SCRAPER_USERNAME }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
          SCRAPER_COUNTRY: 'IE'
          SCRAPER_CURRENCY: 'EUR'
        run: |
          ARGS=""

          if [ "${{ github.event.inputs.retry_mode }}" == "true" ]; then
            ARGS="$ARGS --retry-mode --retry-failed-only"
            echo "Running in RETRY MODE"
          else
            echo "Running in NORMAL MODE — all aliases in single run"
          fi

          # Add limit if specified
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi

          # Add dry-run if specified
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          set -o pipefail
          python apify_tesco_scraper.py $ARGS 2>&1 | tee apify_scraper.log

      - name: 🩺 Validate scrape success
        if: always()
        # Loud-fail health check (MASA-108). Detects silent ingestion failures
        # like the MASA-106 4h outage where every API call returned 401 but the
        # workflow reported success. Hard-fails the job if:
        #   - log file missing (scraper crashed pre-logging)
        #   - "Authentication failed:" > 0 (initial auth fatal)
        #   - TOTAL > 0 and UPLOADS < 5% of TOTAL (silent failure)
        #   - 401-retry-thrashing > 50 (post-MASA-106 helper running hot)
        run: |
          set -u
          LOG="apify_scraper.log"
          if [ ! -f "$LOG" ]; then
            echo "::error::Log file $LOG not found — scraper crashed before producing logs."
            exit 1
          fi

          AUTH_FAILS=$(grep -cE "Authentication failed:" "$LOG" || true)
          AUTH_RETRIES=$(grep -cE "401 on .* re-authenticating and retrying" "$LOG" || true)
          TOTAL=$(grep -E "Total aliases:\s+[0-9]+" "$LOG" | grep -oE "[0-9]+" | tail -1)
          UPLOADS=$(grep -E "Prices uploaded:\s+[0-9]+" "$LOG" | grep -oE "[0-9]+" | tail -1)
          TOTAL=${TOTAL:-0}
          UPLOADS=${UPLOADS:-0}

          echo "::notice::tesco health: total_aliases=$TOTAL uploads=$UPLOADS auth_fails=$AUTH_FAILS auth_retries=$AUTH_RETRIES"

          FAIL=0
          if [ "$AUTH_FAILS" -gt 0 ]; then
            echo "::error::tesco: $AUTH_FAILS fatal auth failures detected."
            FAIL=1
          fi
          if [ "$AUTH_RETRIES" -gt 50 ]; then
            echo "::error::tesco: $AUTH_RETRIES 401-retry events — JWT TTL likely too short, MASA-107 territory."
            FAIL=1
          fi
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$(( UPLOADS * 100 / TOTAL ))
            if [ "$UPLOADS" -lt 5 ] || [ "$PCT" -lt 5 ]; then
              echo "::error::tesco: silent-ingestion alarm — $UPLOADS uploads from $TOTAL aliases (${PCT}%, threshold 5%)."
              FAIL=1
            fi
          fi
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "✅ tesco health check passed: $UPLOADS/$TOTAL uploaded, $AUTH_FAILS fatal auth fails, $AUTH_RETRIES re-auth events."

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-scraper-logs-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Apify Tesco Scraper failed. Check logs for details."
