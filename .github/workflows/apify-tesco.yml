name: Apify Tesco Scraper

on:
  schedule:
    # Monday only — 3 runs to cover all ~1,713 aliases (500 per run)
    - cron: '0 6 * * 1'    # Monday 6AM — batch 0 (aliases 1-500)
    - cron: '0 8 * * 1'    # Monday 8AM — batch 1 (aliases 501-1000)
    - cron: '0 10 * * 1'   # Monday 10AM — batch 2 (aliases 1001-1713)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of products to scrape (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Run without uploading prices'
        required: false
        type: boolean
        default: false
      retry_mode:
        description: 'Only scrape pending/failed products (retry mode)'
        required: false
        type: boolean
        default: false

jobs:
  scrape-tesco:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apify-client requests

      - name: Run Apify Tesco Scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_TESCO_API_TOKEN }}
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_USERNAME: ${{ secrets.SCRAPER_USERNAME }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
          APIFY_TESCO_FALLBACK_ACTOR_ID: ${{ secrets.APIFY_TESCO_FALLBACK_ACTOR_ID }}
          SCRAPER_COUNTRY: 'IE'
          SCRAPER_CURRENCY: 'EUR'
        run: |
          ARGS=""

          # All 3 Monday runs use NORMAL MODE with hour-based batch rotation
          # 6AM → batch 0 (aliases 1-500), 8AM → batch 1 (501-1000), 10AM → batch 2 (1001+)
          # Manual dispatch and retry mode still supported via inputs
          if [ "${{ github.event.inputs.retry_mode }}" == "true" ]; then
            ARGS="$ARGS --retry-mode --retry-failed-only --fallback-only"
            echo "Running in RETRY MODE (manual trigger)"
          else
            echo "Running in NORMAL MODE — batch selected by current hour (UTC)"
          fi

          # Add limit if specified
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi

          # Add dry-run if specified
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python apify_tesco_scraper.py $ARGS 2>&1 | tee apify_scraper.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-scraper-logs-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Apify Tesco Scraper failed. Check logs for details."
