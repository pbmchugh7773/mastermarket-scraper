name: Apify Tesco Scraper

on:
  schedule:
    # Lunes, Miércoles, Viernes y Sábado a las 6:00 AM UTC (normal mode)
    - cron: '0 6 * * 1'   # Monday
    - cron: '0 6 * * 3'   # Wednesday
    - cron: '0 6 * * 5'   # Friday
    - cron: '0 6 * * 6'   # Saturday
    # Retry run 2 hours later (8:00 AM UTC) for failed/pending products
    - cron: '0 8 * * 1'   # Monday retry
    - cron: '0 8 * * 3'   # Wednesday retry
    - cron: '0 8 * * 5'   # Friday retry
    - cron: '0 8 * * 6'   # Saturday retry
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of products to scrape (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Run without uploading prices'
        required: false
        type: boolean
        default: false
      retry_mode:
        description: 'Only scrape pending/failed products (retry mode)'
        required: false
        type: boolean
        default: false

jobs:
  scrape-tesco:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apify-client requests

      - name: Run Apify Tesco Scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_TESCO_API_TOKEN }}
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_USERNAME: ${{ secrets.SCRAPER_USERNAME }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
          APIFY_TESCO_FALLBACK_ACTOR_ID: ${{ secrets.APIFY_TESCO_FALLBACK_ACTOR_ID }}
        run: |
          ARGS=""

          # Detect if this is a retry run (scheduled at 8 AM or manual retry)
          SCHEDULE="${{ github.event.schedule }}"
          if [[ "$SCHEDULE" == "0 8 "* ]] || [ "${{ github.event.inputs.retry_mode }}" == "true" ]; then
            ARGS="$ARGS --retry-mode --fallback-only"
            echo "Running in RETRY MODE with FALLBACK actor (pending/failed products only)"
          else
            echo "Running in NORMAL MODE (primary + inline fallback)"
          fi

          # Add limit if specified
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi

          # Add dry-run if specified
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python apify_tesco_scraper.py $ARGS 2>&1 | tee apify_scraper.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-scraper-logs-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Apify Tesco Scraper failed. Check logs for details."
