name: Apify Dunnes Scraper

on:
  schedule:
    # Aligned with other stores on Mon + Thu (was Tue + Fri) — 2026-04-18.
    - cron: '0 6 * * 1'  # Monday — main run
    - cron: '0 6 * * 4'  # Thursday — main run
    # Retry runs 2 hours later (8:00 AM UTC) for failed/pending products
    - cron: '0 8 * * 1'  # Monday — retry
    - cron: '0 8 * * 4'  # Thursday — retry
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max products to scrape (empty = no limit)'
        required: false
        default: ''
      dry_run:
        description: 'Run without uploading prices'
        required: false
        type: boolean
        default: false
      all_products:
        description: 'Scrape ALL products (not just pending)'
        required: false
        type: boolean
        default: false
      use_residential_proxy:
        description: 'Use residential proxy (required for Cloudflare bypass)'
        required: false
        type: boolean
        default: true

jobs:
  scrape-dunnes:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 4 batches × 25 min + upload + startup overhead

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apify-client requests

      - name: Run Apify Dunnes Scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_DUNNES_ACTOR_ID: ${{ secrets.APIFY_DUNNES_ACTOR_ID }}
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_USERNAME: ${{ secrets.SCRAPER_USERNAME }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
          SCRAPER_COUNTRY: 'IE'
          SCRAPER_CURRENCY: 'EUR'
        run: |
          ARGS=""

          # Default: only pending products
          # Use --all to scrape all products (scheduled 6 AM runs or manual with all_products=true)
          CURRENT_HOUR=$(date +%H)
          if [ "$CURRENT_HOUR" == "06" ] || [ "${{ github.event.inputs.all_products }}" == "true" ]; then
            ARGS="$ARGS --all"
            echo "Running in ALL MODE (all products)"
          else
            echo "Running in PENDING MODE (only pending/failed products)"
          fi

          # Add limit if specified
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi

          # Add dry-run if specified
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          # Always use residential proxy — datacenter is 100% blocked by Dunnes
          # Cloudflare (verified 2026-04-21: 42/42 URLs returned 403 on datacenter).
          # Manual dispatch can still override with use_residential_proxy=false
          # for debugging, but scheduled runs always use residential.
          if [ "${{ github.event.inputs.use_residential_proxy }}" != "false" ]; then
            ARGS="$ARGS --use-residential-proxy"
            echo "Using RESIDENTIAL proxy (required — datacenter gets 403 on Dunnes)"
          else
            echo "Using DATACENTER proxy (manual override; expect ~100% failure rate)"
          fi

          set -o pipefail
          python apify_dunnes_scraper.py $ARGS 2>&1 | tee apify_dunnes_scraper.log

      - name: 🩺 Validate scrape success
        if: always()
        # Loud-fail health check (MASA-108). Detects silent ingestion failures
        # like the MASA-106 4h outage where every API call returned 401 but the
        # workflow reported success. Hard-fails the job if:
        #   - log file missing (scraper crashed pre-logging)
        #   - "Authentication failed:" > 0 (initial auth fatal)
        #   - TOTAL > 0 and UPLOADS < 5% of TOTAL (silent failure)
        #   - 401-retry-thrashing > 50 (post-MASA-106 helper running hot)
        run: |
          set -u
          LOG="apify_dunnes_scraper.log"
          if [ ! -f "$LOG" ]; then
            echo "::error::Log file $LOG not found — scraper crashed before producing logs."
            exit 1
          fi

          AUTH_FAILS=$(grep -cE "Authentication failed:" "$LOG" || true)
          AUTH_RETRIES=$(grep -cE "401 on .* re-authenticating and retrying" "$LOG" || true)
          TOTAL=$(grep -E "Total aliases:\s+[0-9]+" "$LOG" | grep -oE "[0-9]+" | tail -1)
          UPLOADS=$(grep -E "Prices uploaded:\s+[0-9]+" "$LOG" | grep -oE "[0-9]+" | tail -1)
          TOTAL=${TOTAL:-0}
          UPLOADS=${UPLOADS:-0}

          echo "::notice::dunnes health: total_aliases=$TOTAL uploads=$UPLOADS auth_fails=$AUTH_FAILS auth_retries=$AUTH_RETRIES"

          FAIL=0
          if [ "$AUTH_FAILS" -gt 0 ]; then
            echo "::error::dunnes: $AUTH_FAILS fatal auth failures detected."
            FAIL=1
          fi
          if [ "$AUTH_RETRIES" -gt 50 ]; then
            echo "::error::dunnes: $AUTH_RETRIES 401-retry events — JWT TTL likely too short, MASA-107 territory."
            FAIL=1
          fi
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$(( UPLOADS * 100 / TOTAL ))
            if [ "$UPLOADS" -lt 5 ] || [ "$PCT" -lt 5 ]; then
              echo "::error::dunnes: silent-ingestion alarm — $UPLOADS uploads from $TOTAL aliases (${PCT}%, threshold 5%)."
              FAIL=1
            fi
          fi
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "✅ dunnes health check passed: $UPLOADS/$TOTAL uploaded, $AUTH_FAILS fatal auth fails, $AUTH_RETRIES re-auth events."

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apify-dunnes-scraper-logs-${{ github.run_number }}
          path: '*.log'
          retention-days: 7
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Apify Dunnes Scraper failed. Check logs for details."
