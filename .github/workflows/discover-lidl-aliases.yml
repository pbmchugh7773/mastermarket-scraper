name: Discover Lidl Aliases (Weekly)

# Weekly Lidl URL discovery for MASA-114 / MASA-135 (v3, lidl-own-brand pool).
# Emits a JSON proposal of Lidl URLs that probably match MM products. NEVER
# writes to DB or API — VP Data reviews the artifact and creates aliases
# manually (or via a follow-up tool).
#
# Schedule: Sundays 10:00 UTC — after the 08:00 UTC promotions scan in
# daily-scraping.yml so the candidate set has fresh signal.
#
# CLI: see `python discover_lidl_aliases.py --help`. The v3 script only
# accepts `--pool {aldi-cross-list,lidl-own-brand}`. Threshold/limit/verify
# inputs that existed in v1 (MASA-117) were removed in MASA-119.

on:
  schedule:
    - cron: '0 10 * * 0'  # Sundays 10:00 UTC
  workflow_dispatch:

jobs:
  discover:
    name: Lidl alias discovery
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          # Only `requests` is strictly required — install the full repo
          # requirements to avoid drift from selenium/etc that the candidate
          # query path doesn't use here.
          pip install -r requirements.txt

      - name: Run discovery
        env:
          API_URL: ${{ secrets.API_URL }}
          SCRAPER_USERNAME: ${{ secrets.SCRAPER_USERNAME }}
          SCRAPER_PASSWORD: ${{ secrets.SCRAPER_PASSWORD }}
        run: |
          set -euo pipefail
          python discover_lidl_aliases.py --pool lidl-own-brand

      - name: Upload proposal artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lidl-discovery-${{ github.run_number }}
          path: |
            /tmp/lidl_ownbrand_proposal_*.json
            discover_lidl_*.log
          retention-days: 30
          if-no-files-found: warn

      - name: Surface summary in run log
        if: always()
        run: |
          echo "📊 Lidl Discovery Summary (v3 — lidl-own-brand pool)"
          echo "===================================================="
          JSON=$(ls -t /tmp/lidl_ownbrand_proposal_*.json 2>/dev/null | head -1 || true)
          if [ -z "$JSON" ]; then
            echo "❌ No proposal JSON produced — see run log above."
            exit 1
          fi
          jq -r '
            "  Generated at:                \(.generated_at)",
            "  Pool:                        \(.pool)",
            "  Sitemap URLs:                \(.sitemap_url_count)",
            "  Candidate products:          \(.candidate_product_count)",
            "  Candidates w/ known size:    \(.candidates_with_known_size)",
            "  Threshold:                   \(.threshold)",
            "  Phase 1 URL groups:          \(.phase1_url_groups_after_brand_filter)",
            "  Phase 1.5 brand rejections:  \(.phase1_5_brand_rejections)",
            "  HTML live fetches:           \(.html_fetch.live_attempts) (failures=\(.html_fetch.live_failures), cache_hits=\(.html_fetch.cache_hits))",
            "  HTML no-size:                \(.html_fetch.no_size_in_html)",
            "  Unambiguous proposals:       \(.unambiguous_count)",
            "  Rejected:                    \(.rejected_count)"
          ' "$JSON"
          echo ""
          echo "  Rejection breakdown:"
          jq -r '.rejection_breakdown | to_entries[] | "    \(.key): \(.value)"' "$JSON"
